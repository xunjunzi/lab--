<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>实验室仪器登记管理系统 - IndexedDB版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .app-container {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 36px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.15);
      overflow: hidden;
      height: 780px;
      display: flex;
      flex-direction: column;
    }
    .screen {
      flex: 1;
      overflow-y: auto;
      padding: 22px 18px 15px;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f172a;
    }
    .user-section {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .user-badge {
      background: #eef2ff;
      color: #4338ca;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .role-switch-btn {
      background: #f59e0b;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .role-switch-btn:active {
      background: #d97706;
      transform: scale(0.95);
    }
    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
      border: 1px solid #f1f5f9;
    }
    .input-group {
      margin-bottom: 14px;
    }
    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    input, select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 0.95rem;
      background: #f8fafc;
      transition: 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #6366f1;
      background: white;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
    }
    .time-range-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .time-range-container select {
      flex: 1;
    }
    .time-separator {
      font-weight: 700;
      color: #64748b;
      font-size: 1.2rem;
    }
    .btn {
      background: #4f46e5;
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 40px;
      padding: 14px 22px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active {
      background: #4338ca;
      transform: scale(0.97);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #cbd5e1;
      color: #1e293b;
      margin-top: 8px;
    }
    .btn-small {
      padding: 7px 14px;
      font-size: 0.8rem;
      width: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 30px;
      cursor: pointer;
      border: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-small:active {
      transform: scale(0.95);
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-warning {
      background: #f59e0b;
      color: white;
    }
    .btn-export {
      background: #1e293b;
      color: white;
      margin-top: 12px;
    }
    .btn-backup {
      background: #6366f1;
      color: white;
      margin-top: 8px;
    }
    .flex-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-available {
      background: #d1fae5;
      color: #065f46;
    }
    .status-inuse {
      background: #fef3c7;
      color: #92400e;
    }
    .status-maintenance {
      background: #fee2e2;
      color: #991b1b;
    }
    .instrument-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .record-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.85rem;
      flex-wrap: wrap;
      gap: 4px;
    }
    .admin-panel {
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: 22px;
      padding: 16px;
      margin-top: 8px;
    }
    .divider {
      margin: 16px 0;
      height: 2px;
      background: #e9eef2;
    }
    .text-muted {
      color: #64748b;
      font-size: 0.8rem;
    }
    .logout-link {
      color: #ef4444;
      font-size: 0.8rem;
      margin-left: 6px;
      cursor: pointer;
      font-weight: 700;
    }
    .empty-message {
      text-align: center;
      color: #94a3b8;
      padding: 25px;
      font-size: 0.9rem;
    }
    .hint-text {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 4px;
    }
    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: #991b1b;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: #4f46e5;
      border-radius: 2px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="screen" style="justify-content: center; align-items: center;">
    <h2>⏳ 加载中...</h2>
  </div>
</div>

<script>
  (function() {
    // ========== IndexedDB 数据库封装 ==========
    const DB_NAME = 'LabInstrumentDB';
    const DB_VERSION = 1;
    let db = null;

    // 打开数据库
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          // 创建对象仓库
          if (!db.objectStoreNames.contains('users')) {
            db.createObjectStore('users', { keyPath: 'id' });
          }
          if (!db.objectStoreNames.contains('instruments')) {
            db.createObjectStore('instruments', { keyPath: 'id' });
          }
          if (!db.objectStoreNames.contains('records')) {
            const recordsStore = db.createObjectStore('records', { keyPath: 'id' });
            recordsStore.createIndex('userId', 'userId', { unique: false });
            recordsStore.createIndex('instrumentId', 'instrumentId', { unique: false });
            recordsStore.createIndex('createdAt', 'createdAt', { unique: false });
          }
          if (!db.objectStoreNames.contains('currentUser')) {
            db.createObjectStore('currentUser', { keyPath: 'id' });
          }
        };
        
        request.onsuccess = (event) => {
          db = event.target.result;
          resolve(db);
        };
        
        request.onerror = (event) => {
          reject(event.target.error);
        };
      });
    }

    // 通用读取所有数据
    function getAll(storeName) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readonly');
        const store = transaction.objectStore(storeName);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    // 通用保存数据
    function put(storeName, data) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readwrite');
        const store = transaction.objectStore(storeName);
        const request = store.put(data);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    // 通用删除数据
    function remove(storeName, id) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readwrite');
        const store = transaction.objectStore(storeName);
        const request = store.delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    // 清空仓库
    function clearStore(storeName) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readwrite');
        const store = transaction.objectStore(storeName);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    // ========== 数据初始化 ==========
    const STATUS = {
      AVAILABLE: '可使用',
      IN_USE: '使用中',
      MAINTENANCE: '维护中'
    };

    async function initDefaultData() {
      const users = await getAll('users');
      if (users.length === 0) {
        const defaultUsers = [
          { id: 'admin_001', username: 'admin', password: 'admin123', role: 'admin', createdAt: new Date().toISOString() },
          { id: 'user_001', username: 'user1', password: 'user123', role: 'user', createdAt: new Date().toISOString() }
        ];
        for (const user of defaultUsers) {
          await put('users', user);
        }
      }

      const instruments = await getAll('instruments');
      if (instruments.length === 0) {
        const defaultInstruments = [
          { id: 'ins_1', name: '高效液相色谱仪', model: 'Agilent 1260', status: STATUS.AVAILABLE },
          { id: 'ins_2', name: '紫外分光光度计', model: 'UV-2600', status: STATUS.AVAILABLE },
          { id: 'ins_3', name: '高速离心机', model: 'Eppendorf 5424', status: STATUS.MAINTENANCE }
        ];
        for (const ins of defaultInstruments) {
          await put('instruments', ins);
        }
      }
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
    }

    function formatDateTime(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function formatHour(hour) {
      return String(hour).padStart(2, '0') + ':00';
    }

    function generateHourOptions() {
      let options = '';
      for (let h = 0; h < 24; h++) {
        const hourStr = String(h).padStart(2, '0') + ':00';
        options += `<option value="${h}">${hourStr}</option>`;
      }
      return options;
    }

    const HOUR_OPTIONS = generateHourOptions();
    let currentUser = null;
    const app = document.getElementById('appContainer');

    // ========== 界面渲染 ==========
    async function renderLogin() {
      app.innerHTML = `
        <div class="screen">
          <div style="text-align:center; margin-top:35px;">
            <h2 style="font-size:2rem;">🧪 实验室仪器</h2>
            <p class="text-muted">登记管理系统</p>
          </div>
          <div class="card" style="margin-top:30px;">
            <div class="input-group"><label>👤 用户名</label><input id="loginUser" placeholder="输入用户名"></div>
            <div class="input-group"><label>🔒 密码</label><input type="password" id="loginPass" placeholder="输入密码"></div>
            <button class="btn" id="loginBtn">登 录</button>
            <button class="btn btn-outline" id="goRegister">注册新账号</button>
          </div>
          <div class="alert">
            💾 <strong>数据持久版说明：</strong><br>
            • 使用IndexedDB存储，数据更稳定<br>
            • 不会因清除缓存而丢失数据<br>
            • 支持手动备份和恢复
          </div>
          <p class="text-muted" style="text-align:center;">默认管理员 admin / admin123</p>
          <p class="text-muted" style="text-align:center;">普通用户 user1 / user123</p>
        </div>
      `;
      document.getElementById('loginBtn').onclick = handleLogin;
      document.getElementById('goRegister').onclick = renderRegister;
    }

    async function handleLogin() {
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value.trim();
      if(!u||!p) return alert('请输入完整信息');
      const users = await getAll('users');
      const user = users.find(x => x.username === u && x.password === p);
      if(!user) return alert('用户名或密码错误');
      currentUser = user;
      await put('currentUser', { id: 'current', user: user });
      await renderMain();
    }

    function renderRegister() {
      app.innerHTML = `
        <div class="screen">
          <button class="btn-small btn-outline" id="backLogin" style="margin-bottom:12px;">← 返回登录</button>
          <h2>📝 注册</h2>
          <div class="card">
            <div class="input-group"><label>用户名</label><input id="regUser"></div>
            <div class="input-group"><label>密码 (至少4位)</label><input type="password" id="regPass"></div>
            <button class="btn" id="regSubmit">注册</button>
          </div>
        </div>
      `;
      document.getElementById('backLogin').onclick = renderLogin;
      document.getElementById('regSubmit').onclick = async () => {
        const u = document.getElementById('regUser').value.trim();
        const p = document.getElementById('regPass').value.trim();
        if(!u||!p) return alert('填写完整');
        if(p.length<4) return alert('密码至少4位');
        const users = await getAll('users');
        if(users.find(x=>x.username===u)) return alert('用户名已存在');
        await put('users', { id: generateId(), username: u, password: p, role: 'user', createdAt: new Date().toISOString() });
        alert('注册成功！');
        await renderLogin();
      };
    }

    async function logout() {
      await remove('currentUser', 'current');
      currentUser = null;
      await renderLogin();
    }

    async function switchRole() {
      if (!currentUser) return;
      const users = await getAll('users');
      const oppositeRole = currentUser.role === 'admin' ? 'user' : 'admin';
      const switchUser = users.find(u => u.role === oppositeRole);
      if (switchUser) {
        currentUser = switchUser;
        await put('currentUser', { id: 'current', user: switchUser });
        await renderMain();
        alert(`已切换为 ${oppositeRole === 'admin' ? '管理员' : '普通用户'} 账号：${switchUser.username}`);
      } else {
        alert(`没有${oppositeRole === 'admin' ? '管理员' : '普通用户'}账号可切换`);
      }
    }

    async function renderMain() {
      if (!currentUser) {
        await renderLogin();
        return;
      }
      
      const instruments = await getAll('instruments');
      const records = await getAll('records');
      const isAdmin = currentUser.role === 'admin';

      const availableInstruments = instruments.filter(i => i.status === STATUS.AVAILABLE);
      const instrumentOptions = (isAdmin ? instruments : availableInstruments).map(i => 
        `<option value="${i.id}">${i.name} (${i.model||'无型号'}) - ${i.status}</option>`
      ).join('');

      const myRecords = records.filter(r => r.userId === currentUser.id).slice(-5);
      const myRecordsHtml = myRecords.length ? myRecords.map(r => `
        <div class="record-row">
          <span><strong>${r.instrumentName}</strong></span>
          <span>${r.timeSlot}</span>
          <span class="text-muted">${formatDateTime(r.createdAt)}</span>
        </div>
      `).join('') : '<div class="empty-message">暂无使用记录</div>';

      let adminHtml = '';
      if (isAdmin) {
        adminHtml = `
          <div class="admin-panel">
            <h4 style="margin-bottom:12px;">🔧 仪器管理 (增删/修改状态)</h4>
            <div class="flex-row" style="margin-bottom:10px;">
              <input id="newInsName" placeholder="仪器名称" style="flex:2;">
              <input id="newInsModel" placeholder="型号" style="flex:1.5;">
            </div>
            <button class="btn-small btn-success" id="addInsBtn">➕ 添加仪器</button>
            <div id="adminInsList" style="max-height:200px; overflow-y:auto; margin:12px 0;"></div>
            
            <div class="divider"></div>
            <h4 style="margin-bottom:8px;">📊 全部使用者记录</h4>
            <div id="allRecordsContainer" style="max-height:180px; overflow-y:auto; background:white; border-radius:14px; padding:8px;"></div>
            <button class="btn btn-export" id="exportExcelBtn">📥 导出Excel (CSV)</button>
            <button class="btn btn-backup" id="backupDataBtn">💾 备份所有数据</button>
            <button class="btn btn-outline" id="restoreDataBtn" style="margin-top:4px;">📂 恢复数据备份</button>
            <input type="file" id="restoreFileInput" accept=".json" style="display:none;">
          </div>
        `;
      }

      app.innerHTML = `
        <div class="screen">
          <div class="header">
            <h2>📋 仪器登记</h2>
            <div class="user-section">
              <div class="user-badge">
                ${currentUser.role === 'admin' ? '🔑' : '👤'} ${currentUser.username}
              </div>
              <button class="role-switch-btn" id="switchRoleBtn">⇄ 切换</button>
              <span class="logout-link" id="logoutBtn">退出</span>
            </div>
          </div>
          
          <div class="card">
            <label>🔬 选择仪器 (仅显示可使用)</label>
            <select id="instrumentSelect">${instrumentOptions}</select>
            
            <label style="margin-top:14px;">⏱️ 使用时间段 (24小时灵活选择)</label>
            <div class="time-range-container">
              <select id="startHourSelect">${HOUR_OPTIONS}</select>
              <span class="time-separator">→</span>
              <select id="endHourSelect">${HOUR_OPTIONS}</select>
            </div>
            <p class="hint-text">💡 开始时间必须早于结束时间</p>
            
            <button class="btn" id="registerUseBtn" style="margin-top:16px;">✅ 登记使用</button>
          </div>

          <div class="card">
            <h4 style="margin-bottom:10px;">📌 我的最近登记</h4>
            ${myRecordsHtml}
          </div>

          ${adminHtml}
        </div>
      `;

      document.getElementById('logoutBtn').onclick = logout;
      document.getElementById('switchRoleBtn').onclick = switchRole;
      
      const startSelect = document.getElementById('startHourSelect');
      const endSelect = document.getElementById('endHourSelect');
      if (startSelect && endSelect) {
        startSelect.value = '8';
        endSelect.value = '17';
      }
      
      document.getElementById('registerUseBtn').onclick = async () => {
        const insId = document.getElementById('instrumentSelect').value;
        const startHour = parseInt(document.getElementById('startHourSelect').value);
        const endHour = parseInt(document.getElementById('endHourSelect').value);
        
        const instruments = await getAll('instruments');
        const ins = instruments.find(i => i.id === insId);
        if (!ins) return alert('请选择仪器');
        if (ins.status !== STATUS.AVAILABLE) return alert('该仪器当前不可使用');
        
        if (startHour >= endHour) {
          return alert('开始时间必须早于结束时间！');
        }
        
        const timeSlot = `${formatHour(startHour)}-${formatHour(endHour)}`;
        
        const rec = {
          id: generateId(),
          userId: currentUser.id,
          username: currentUser.username,
          instrumentId: ins.id,
          instrumentName: ins.name,
          timeSlot: timeSlot,
          startHour: startHour,
          endHour: endHour,
          createdAt: new Date().toISOString()
        };
        
        await put('records', rec);
        alert(`登记成功！\n仪器：${ins.name}\n时间段：${timeSlot}`);
        await renderMain();
      };

      if (isAdmin) {
        await renderAdminInstrumentList();
        document.getElementById('addInsBtn').onclick = async () => {
          const name = document.getElementById('newInsName').value.trim();
          const model = document.getElementById('newInsModel').value.trim();
          if (!name) return alert('仪器名称必填');
          await put('instruments', {
            id: generateId(),
            name,
            model,
            status: STATUS.AVAILABLE
          });
          await renderMain();
        };
        await renderAllRecords();
        document.getElementById('exportExcelBtn').onclick = exportToExcel;
        document.getElementById('backupDataBtn').onclick = backupAllData;
        document.getElementById('restoreDataBtn').onclick = () => {
          document.getElementById('restoreFileInput').click();
        };
        document.getElementById('restoreFileInput').onchange = restoreDataFromFile;
      }
    }

    async function renderAdminInstrumentList() {
      const listEl = document.getElementById('adminInsList');
      if (!listEl) return;
      const instruments = await getAll('instruments');
      listEl.innerHTML = instruments.map(i => {
        let statusClass = '';
        if (i.status === STATUS.AVAILABLE) statusClass = 'status-available';
        else if (i.status === STATUS.IN_USE) statusClass = 'status-inuse';
        else statusClass = 'status-maintenance';
        
        return `
          <div class="instrument-item">
            <div>
              <strong>${i.name}</strong> <span class="text-muted">${i.model||''}</span>
              <span class="status-badge ${statusClass}">${i.status}</span>
            </div>
            <div class="flex-row" style="gap:6px;">
              <button class="btn-small btn-warning" data-action="status" data-id="${i.id}">状态</button>
              <button class="btn-small btn-danger" data-action="delete" data-id="${i.id}">删除</button>
            </div>
          </div>
        `;
      }).join('');

      listEl.querySelectorAll('button').forEach(btn => {
        btn.onclick = async (e) => {
          const action = e.target.getAttribute('data-action');
          const id = e.target.getAttribute('data-id');
          if (action === 'delete') {
            if (confirm('确定删除该仪器吗？')) {
              await remove('instruments', id);
              await renderMain();
            }
          } else if (action === 'status') {
            const instruments = await getAll('instruments');
            const ins = instruments.find(i => i.id === id);
            if (!ins) return;
            const statuses = [STATUS.AVAILABLE, STATUS.IN_USE, STATUS.MAINTENANCE];
            const currentIndex = statuses.indexOf(ins.status);
            const nextIndex = (currentIndex + 1) % statuses.length;
            const newStatus = statuses[nextIndex];
            if (confirm(`将 ${ins.name} 状态从 [${ins.status}] 改为 [${newStatus}] 吗？`)) {
              ins.status = newStatus;
              await put('instruments', ins);
              await renderMain();
            }
          }
        };
      });
    }

    async function renderAllRecords() {
      const container = document.getElementById('allRecordsContainer');
      if (!container) return;
      const records = await getAll('records');
      records.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      if (records.length === 0) {
        container.innerHTML = '<div class="empty-message">暂无登记记录</div>';
        return;
      }
      container.innerHTML = records.map(r => `
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; padding:6px; border-bottom:1px solid #eee; flex-wrap:wrap;">
          <span><b>${r.username}</b></span>
          <span>${r.instrumentName}</span>
          <span>${r.timeSlot}</span>
          <span class="text-muted">${formatDateTime(r.createdAt)}</span>
        </div>
      `).join('');
    }

    async function exportToExcel() {
      const records = await getAll('records');
      records.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      if (records.length === 0) {
        alert('没有记录可导出');
        return;
      }
      let csv = '\uFEFF用户名,仪器名称,使用时间段,登记时间\n';
      records.forEach(r => {
        csv += `"${r.username}","${r.instrumentName}","${r.timeSlot}","${formatDateTime(r.createdAt)}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `仪器使用记录_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 备份所有数据到JSON文件
    async function backupAllData() {
      const users = await getAll('users');
      const instruments = await getAll('instruments');
      const records = await getAll('records');
      
      const backupData = {
        version: '1.0',
        backupDate: new Date().toISOString(),
        users: users,
        instruments: instruments,
        records: records
      };
      
      const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `仪器系统备份_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert('✅ 数据备份成功！');
    }

    // 从JSON文件恢复数据
    async function restoreDataFromFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      if (!confirm('⚠️ 恢复数据会覆盖当前所有数据，确定继续吗？')) {
        event.target.value = '';
        return;
      }
      
      try {
        const text = await file.text();
        const backupData = JSON.parse(text);
        
        if (!backupData.users || !backupData.instruments || !backupData.records) {
          throw new Error('备份文件格式不正确');
        }
        
        // 清空现有数据
        await clearStore('users');
        await clearStore('instruments');
        await clearStore('records');
        
        // 恢复数据
        for (const user of backupData.users) {
          await put('users', user);
        }
        for (const ins of backupData.instruments) {
          await put('instruments', ins);
        }
        for (const rec of backupData.records) {
          await put('records', rec);
        }
        
        alert('✅ 数据恢复成功！请重新登录。');
        await logout();
        event.target.value = '';
      } catch (error) {
        alert('❌ 恢复失败：' + error.message);
        event.target.value = '';
      }
    }

    // ========== 启动应用 ==========
    async function initApp() {
      try {
        await openDB();
        await initDefaultData();
        
        // 检查是否有保存的登录状态
        const savedUsers = await getAll('currentUser');
        if (savedUsers.length > 0) {
          currentUser = savedUsers[0].user;
          await renderMain();
        } else {
          await renderLogin();
        }
      } catch (error) {
        app.innerHTML = `
          <div class="screen" style="justify-content: center; align-items: center;">
            <h2>❌ 错误</h2>
            <p>${error.message}</p>
            <button class="btn" onclick="location.reload()">重试</button>
          </div>
        `;
      }
    }

    initApp();
  })();
</script>
</body>
</html>
